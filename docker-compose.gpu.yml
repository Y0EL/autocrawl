# GPU override file. Use:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
#
# Requires NVIDIA Container Toolkit on host:
#   https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
#
# When this overlay is active, the crawler container can use the GPU for Surya OCR.
services:
  crawler:
    environment:
      SURYA_DEVICE: cuda
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
