name: autocrawl

services:
  crawler:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        HF_TOKEN: ${HF_TOKEN:-}
    image: autocrawl/crawler:latest
    container_name: autocrawl-crawler
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      CHROMA_HOST: chroma
      CHROMA_PORT: "8000"
      FLARESOLVERR_URL: http://flaresolverr:8191/v1
      LANGFUSE_HOST: http://langfuse-web:3000
      DATABASE_URL: postgresql+asyncpg://postgres:123@autocrawl-db:5432/autocrawl
      DATA_DIR: /app/data
      LOG_DIR: /app/logs
      CONFIG_DIR: /app/config
      TRANSLATION_ENABLED: "true"
      TRANSLATION_PROVIDER: nllb
      NLLB_MODEL_PATH: /opt/nllb_ct2
      NLLB_TOKENIZER_PATH: /opt/nllb_hf/snapshot
      TARGET_LANGUAGE: id
      ENABLE_OPENSERP: "true"
      OPENSERP_URL: http://openserp:7000
      OPENSERP_ENGINES: "baidu"
      OPENSERP_MAX_RETRIES: "1"
      ENABLE_SEARXNG: "true"
      SEARXNG_URL: http://searxng:8080
      ENABLE_REDDIT: "true"
      ENABLE_HACKERNEWS: "true"
      ENABLE_GITHUB_SEARCH: "true"
      ENABLE_ARXIV: "true"
      ENABLE_OPENALEX: "true"
      ENABLE_SEMANTIC_SCHOLAR: "true"
      ENABLE_INTERNET_ARCHIVE: "true"
      ENABLE_WAYBACK_CDX: "true"
      ENABLE_JINA_READER: "true"
      ENABLE_DIRECTORY_SCRAPE: "true"
      ENABLE_KATANA: "true"
      ENABLE_CRTSH: "true"
      ENABLE_TAVILY: ${ENABLE_TAVILY:-false}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      ENABLE_BRAVE: ${ENABLE_BRAVE:-false}
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
      ENABLE_BING: ${ENABLE_BING:-false}
      BING_API_KEY: ${BING_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      ENABLE_URLSCAN: ${ENABLE_URLSCAN:-false}
      URLSCAN_API_KEY: ${URLSCAN_API_KEY:-}
      # Fully remote Ollama (LAN). Chat: qwen3.6:35b MoE Q4. Embedding:
      # embeddinggemma:300m (768-dim, BF16). Ga butuh ollama lokal.
      # Untuk switch ke Groq atau OpenAI, ubah LLM_PROVIDER lewat .env.
      LLM_PROVIDER: ollama
      LLM_BASE_URL: http://10.83.81.246:11434
      EMBEDDING_PROVIDER: ollama
      EMBEDDING_BASE_URL: http://10.83.81.246:11434
      OPENAI_MODEL_HEAVY: qwen3.6:35b
      OPENAI_MODEL_LIGHT: qwen3.6:35b
      OPENAI_EMBEDDING_MODEL: embeddinggemma:300m
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_BASE_URL: https://api.groq.com/openai/v1
    depends_on:
      redis:
        condition: service_healthy
      chroma:
        condition: service_started
      flaresolverr:
        condition: service_started
      autocrawl-db:
        condition: service_healthy
      openserp:
        condition: service_started
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config:ro
    networks: [crawl_net]
    ports:
      - "8080:8080"
    shm_size: 4gb

  api:
    image: autocrawl/crawler:latest
    container_name: autocrawl-api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:123@autocrawl-db:5432/autocrawl
      DATA_DIR: /app/data
      LOG_DIR: /app/logs
      CONFIG_DIR: /app/config
      API_CORS_ORIGINS: http://localhost:5173,http://localhost:8090
      TRANSLATION_ENABLED: "true"
      TRANSLATION_PROVIDER: nllb
      NLLB_MODEL_PATH: /opt/nllb_ct2
      NLLB_TOKENIZER_PATH: /opt/nllb_hf/snapshot
      TARGET_LANGUAGE: id
      ENABLE_OPENSERP: "true"
      OPENSERP_URL: http://openserp:7000
      OPENSERP_ENGINES: "baidu"
      OPENSERP_MAX_RETRIES: "1"
      ENABLE_SEARXNG: "true"
      SEARXNG_URL: http://searxng:8080
      ENABLE_REDDIT: "true"
      ENABLE_HACKERNEWS: "true"
      ENABLE_GITHUB_SEARCH: "true"
      ENABLE_ARXIV: "true"
      ENABLE_OPENALEX: "true"
      ENABLE_SEMANTIC_SCHOLAR: "true"
      ENABLE_INTERNET_ARCHIVE: "true"
      ENABLE_WAYBACK_CDX: "true"
      ENABLE_JINA_READER: "true"
      ENABLE_DIRECTORY_SCRAPE: "true"
      ENABLE_KATANA: "true"
      ENABLE_CRTSH: "true"
      ENABLE_TAVILY: ${ENABLE_TAVILY:-false}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      ENABLE_BRAVE: ${ENABLE_BRAVE:-false}
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
      ENABLE_BING: ${ENABLE_BING:-false}
      BING_API_KEY: ${BING_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      ENABLE_URLSCAN: ${ENABLE_URLSCAN:-false}
      URLSCAN_API_KEY: ${URLSCAN_API_KEY:-}
      # Fully remote Ollama (LAN). Chat: qwen3.6:35b MoE Q4. Embedding:
      # embeddinggemma:300m (768-dim, BF16). Ga butuh ollama lokal.
      # Untuk switch ke Groq atau OpenAI, ubah LLM_PROVIDER lewat .env.
      LLM_PROVIDER: ollama
      LLM_BASE_URL: http://10.83.81.246:11434
      EMBEDDING_PROVIDER: ollama
      EMBEDDING_BASE_URL: http://10.83.81.246:11434
      OPENAI_MODEL_HEAVY: qwen3.6:35b
      OPENAI_MODEL_LIGHT: qwen3.6:35b
      OPENAI_EMBEDDING_MODEL: embeddinggemma:300m
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_BASE_URL: https://api.groq.com/openai/v1
    depends_on:
      autocrawl-db:
        condition: service_healthy
      crawler:
        condition: service_started
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config:ro
    command:
      ["uvicorn", "crawler.api:app", "--host", "0.0.0.0", "--port", "8081", "--proxy-headers"]
    networks: [crawl_net]
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  autocrawl-db:
    image: postgres:16-alpine
    container_name: autocrawl-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123"
      POSTGRES_DB: autocrawl
    volumes:
      - autocrawl_pgdata:/var/lib/postgresql/data
    networks: [crawl_net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d autocrawl"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: autocrawl/frontend:latest
    container_name: autocrawl-frontend
    restart: unless-stopped
    depends_on:
      - api
    networks: [crawl_net]
    ports:
      - "8090:80"

  redis:
    image: redis:7-alpine
    container_name: autocrawl-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "100", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks: [crawl_net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  chroma:
    image: chromadb/chroma:latest
    container_name: autocrawl-chroma
    restart: unless-stopped
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    volumes:
      - chroma_data:/chroma/chroma
    networks: [crawl_net]
    ports:
      - "8000:8000"

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: autocrawl-flaresolverr
    restart: unless-stopped
    environment:
      LOG_LEVEL: info
      TZ: UTC
    networks: [crawl_net]
    ports:
      - "8191:8191"

  openserp:
    image: karust/openserp:latest
    container_name: autocrawl-openserp
    restart: unless-stopped
    ports:
      - "7000:7000"
    # OpenSERP is a Cobra CLI. The image entrypoint is just `openserp` so we
    # have to supply the subcommand. `serve` runs the HTTP API for all engines.
    # Bind 0.0.0.0 so the crawler container can reach it; default 127.0.0.1
    # would only listen inside the container itself.
    command: ["serve", "--host", "0.0.0.0", "--port", "7000"]
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:7000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
    networks: [crawl_net]

  # ---- Observability ----
  langfuse-db:
    image: postgres:16-alpine
    container_name: autocrawl-langfuse-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_db:/var/lib/postgresql/data
    networks: [crawl_net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 10s
      timeout: 3s
      retries: 5

  langfuse-web:
    # Pinned to v2 — v3 requires ClickHouse + Redis + S3 (much heavier stack).
    # v2 is single-container with Postgres only and is fine for our use case.
    image: ghcr.io/langfuse/langfuse:2
    container_name: autocrawl-langfuse
    restart: unless-stopped
    depends_on:
      langfuse-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      NEXTAUTH_SECRET: "change-me-please-12345"
      SALT: "change-me-please-67890"
      NEXTAUTH_URL: http://localhost:3001
      TELEMETRY_ENABLED: "false"
    networks: [crawl_net]
    ports:
      - "3001:3000"

  prometheus:
    image: prom/prometheus:latest
    container_name: autocrawl-prometheus
    restart: unless-stopped
    volumes:
      - ./backend/ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom_data:/prometheus
    networks: [crawl_net]
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: autocrawl-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: ""
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./backend/ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./backend/ops/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks: [crawl_net]
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

networks:
  crawl_net:
    driver: bridge

volumes:
  redis_data:
  chroma_data:
  langfuse_db:
  prom_data:
  grafana_data:
  autocrawl_pgdata:
  searxng_data:
